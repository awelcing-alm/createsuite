<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3c"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Main window -->
  <rect x="200" y="80" width="800" height="470" fill="url(#windowGrad)" rx="20"/>
  
  <!-- Title bar -->
  <rect x="200" y="80" width="800" height="50" fill="#2c2c2e" rx="20"/>
  <rect x="200" y="115" width="800" height="15" fill="#2c2c2e"/>
  
  <!-- Traffic lights -->
  <circle cx="230" cy="105" r="12" fill="#ff5f57"/>
  <circle cx="260" cy="105" r="12" fill="#febc2e"/>
  <circle cx="290" cy="105" r="12" fill="#28c840"/>
  
  <!-- Title -->
  <text x="600" y="113" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="24" text-anchor="middle">CreateSuite - AI Agent Command Center</text>
  
  <!-- 4 Quadrant Preview (smaller) -->
  <g transform="translate(230, 170)">
    <!-- Top Left -->
    <rect x="0" y="0" width="340" height="170" fill="#1a1a2e" rx="8"/>
    <path d="M40 60 Q60 50 80 70 Q100 90 120 80" stroke="#007aff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="100" cy="55" r="10" fill="#007aff"/>
    
    <!-- Top Right -->
    <rect x="360" y="0" width="340" height="170" fill="#1a1a2e" rx="8"/>
    <rect x="400" y="50" width="40" height="40" fill="#34c759" rx="4"/>
    <circle cx="480" cy="70" r="25" fill="#34c759" opacity="0.6"/>
    <rect x="420" y="110" width="100" height="8" fill="#34c759" rx="4"/>
    
    <!-- Bottom Left -->
    <rect x="0" y="190" width="340" height="170" fill="#1a1a2e" rx="8"/>
    <path d="M40 270 L60 250 L80 270 L100 260" stroke="#febc2e" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="310" r="15" fill="none" stroke="#febc2e" stroke-width="3"/>
    <text x="85" y="315" fill="#febc2e" font-size="24" font-weight="bold">✦</text>
    
    <!-- Bottom Right -->
    <rect x="360" y="190" width="340" height="170" fill="#1a1a2e" rx="8"/>
    <ellipse cx="460" cy="260" rx="35" ry="25" fill="#bf5af2" opacity="0.8"/>
    <path d="M530 240 Q560 260 550 290" stroke="#bf5af2" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="545" cy="310" r="10" fill="#bf5af2"/>
  </g>
  
  <!-- Pencil accent -->
  <path d="M1050 100 L1120 30" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <circle cx="1050" cy="100" r="15" fill="#f59e0b"/>
  <circle cx="1120" cy="30" r="10" fill="#f59e0b"/>
</svg>
